  10: { joint: leg_4_femur_joint, pulse_min:  870, pulse_zero: 1560, pulse_max: 2190, direction: -1 }
  11: { joint: leg_4_tibia_joint, pulse_min:  815, pulse_zero: 1320, pulse_max: 2140, direction:  1 }

  # ---- Leg 5 — mid-left (re-cal nach Mount-Tausch leg_2↔leg_5, 2026-05-24) ----
  12: { joint: leg_5_coxa_joint,  pulse_min: 1350, pulse_zero: 1550, pulse_max: 1750, direction: -1 }
  13: { joint: leg_5_femur_joint, pulse_min:  860, pulse_zero: 1530, pulse_max: 2190, direction: -1 }
