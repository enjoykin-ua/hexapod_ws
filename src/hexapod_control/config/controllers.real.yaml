# controllers.real.yaml - ros2_control-Konfiguration fuer den ECHTEN Hexapod
# (Servo2040-Hardware via hexapod_hardware-Plugin).
#
# Wird vom ros2_control_node in real.launch.py (Phase 9 Stufe G) in den
# controller_manager geladen. Pendant zu controllers.yaml (Sim-Pfad,
# wird vom gz_ros2_control-Plugin in der URDF geladen).
#
# Diffs gegenueber controllers.yaml:
#  - update_rate 100 -> 50 Hz: Plugin-SET_TARGETS-Tickrate ist per
#    Stage D.5/D.6-Design 50 Hz; 100 Hz wuerde den USB-Bus verdoppeln
#    ohne operativen Mehrwert (Servos selber updaten PWM nicht schneller).
#  - use_sim_time true -> false: Wallclock am Pi/Desktop, nicht /clock
#    aus Gazebo (Phase-6-Uebergabe-Notiz in PHASE.md).
#  - state_interfaces [position, velocity] -> [position]: das Plugin
#    exportiert nur position (Echo-State, kein echtes Velocity-Feedback
#    vom Servo2040). Ein 'velocity' in der yaml + nicht-exportiert vom
#    Plugin = JTC-Spawner-Failure (Resource not available).
#
# Phase 10 Stage G — Vel/Accel/Constraint-Entscheidung (2026-05-18):
#
# Diese Datei bleibt limit-frei wegen Echo-State-Realitaet:
# - Plugin liefert kein echtes Servo-Position-Feedback (current_state ==
#   command_state immer), und User-Entscheidung 2026-05-18 schliesst
#   einen Wechsel zu Feedback-Servos aus.
# - Daher sind alle JTC-Toleranz-Constraints (goal_position_tolerance,
#   trajectory, stopped_velocity_tolerance) faktisch wertlos -- sie
#   pruefen Soll gegen Echo-von-Soll, Differenz ist immer 0.
# - Vel/Accel-Limits via YAML-Override haetten zwar echten Effekt (sie
#   clampen die Trajectory-Spline), aber:
#     1. URDF-Velocity-Hard-Cap (2.0 rad/s) ist bereits aktiv und
#        ausreichend konservativ aus Servo-Spec.
#     2. Phase 10 hat keine Bench-CSV (F.4 deferred, aufgehaengtes Bein
#        liefert nicht repraesentative Werte fuer Voll-Last-Walking).
#     3. Konservative Erst-Werte ohne Bench-Daten waeren rein arbitraer.
#
# Stage-G-Done-Kriterium G1 ("Vel/Accel-Limits in YAML") wird hier
# pragmatisch als "URDF-Hard-Cap reicht + Phase-12-Verfeinerung ist
# Cross-Phase-Pendenz" interpretiert. Memory-Eintrag
# project_phase10_real_yaml_vel_limits.md bleibt aktiv fuer Phase 12.
#
# Walking-Sicherheit in Phase 12 ist durch drei Hardware-Schichten gegeben:
#   1. URDF <limit velocity="2.0" effort="5.0"/> (JTC-Cap)
#   2. servo_mapping.yaml pulse_min/max (Firmware-Hard-Clamp pro Servo)
#   3. URDF Position-Limits +-1.57/+-1.50 rad (JTC-Goal-Validation)
#
# Diese Schichten greifen Echo-State-unabhaengig und sind in Phase 10
# bereits aktiv verifiziert.
#
# Phase-12-Stufe-G "Limits hochziehen" kann hier spaeter Vel/Accel-
# Limits ergaenzen wenn Voll-Last-Walking neue Daten liefert.

controller_manager:
  ros__parameters:
    update_rate: 50  # Hz - matches Plugin-Tickrate aus Stage D.5/D.6
    use_sim_time: false  # WICHTIG: false fuer echte HW (Wallclock)

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    leg_1_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    leg_2_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    leg_3_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    leg_4_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    leg_5_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    leg_6_controller:
      type: joint_trajectory_controller/JointTrajectoryController

leg_1_controller:
  ros__parameters:
    joints:
      - leg_1_coxa_joint
      - leg_1_femur_joint
      - leg_1_tibia_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
    state_publish_rate: 50.0
    action_monitor_rate: 20.0

leg_2_controller:
  ros__parameters:
    joints:
      - leg_2_coxa_joint
