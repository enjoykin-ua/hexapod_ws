#
# Reproduzieren / aktualisieren nach Cal-Änderung:
#   python3 tools/walking_envelope_check.py recommend \
#     --body-height -0.07 --safety-margin 0.10 \
#     --output src/hexapod_gait/config/presets/sim_walk.yaml
#
# Andere Höhen / Werte erzeugen:
#   python3 tools/walking_envelope_check.py recommend --body-height -0.06 ...
#   python3 tools/walking_envelope_check.py sweep   # Übersichts-Tabelle
#
# Laden im Sim-Stack:
#   ros2 launch hexapod_gait gait.launch.py \
#     use_sim_time:=true \
#     robot_description_file:=$(ros2 pkg prefix hexapod_description)/share/hexapod_description/urdf/hexapod.urdf.xacro \
#     params_file:=$(ros2 pkg prefix hexapod_gait)/share/hexapod_gait/config/presets/sim_walk.yaml
#
# Default linear_max = step_length_max / stance_duration
#                    = 0.035 / 1.00 = 0.035 m/s (≈ 3.5 cm/s)
# Größere cmd_vel werden geclamped — kein IKError, nur WARN-Log.
# =============================================================================

