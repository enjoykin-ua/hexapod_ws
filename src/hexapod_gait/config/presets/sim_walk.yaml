#
# Auto-generated by tools/walking_envelope_check.py recommend
# Bottleneck at envelope edge: sidestep:out_of_reach (leg_2/leg_5 reach)
# Safety margin applied: 10% (step_length_max trimmed by 10% from envelope max)
#
# Diese Werte sind für ALLE 4 cmd_vel-Szenarien (forward/sidestep/yaw/diagonal)
# kinematisch grün, basierend auf den finalen Stage-D Joint-Limits aus
# Cal-Doku Tab. 3.3. Engste Constraints:
#   - leg_3 tibia_upper = +1.185 rad (Tibia bei Vorwärts-Walking)
