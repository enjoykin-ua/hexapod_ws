# =============================================================================
# Hexapod gait_node Preset — "Sim Walk" (leg_changes / S5)
# =============================================================================
#
# Kanonische Sim-Lauf-Pose = Stance-Modus "mittel" mit den kurzen Beinen
# (Femur 0.060 / Tibia 0.134). Einheitlicher Radius 0.160 → standup_radial ==
# radial → direktes Aufstehen ohne Reposition.
#
# Envelope-validiert (ALLE 4 cmd_vel-Szenarien forward/sidestep/yaw/diagonal):
#   python3 tools/walking_envelope_check.py check \
#     --radial 0.160 --body-height -0.080 --step-length 0.050 --step-height 0.040 --scenario all
#   Standup: python3 tools/standup_envelope_check.py --radial 0.160 --bh-final -0.080
#
# Dieses Preset ist der Test-Anker: tools/test_walking_envelope_check.py prueft,
# dass es fuer "forward" GRUEN bleibt. Nach Cal-/Geometrie-Aenderung neu rechnen.
#
# Laden (Sim, use_sim_time:=true; HW: use_sim_time:=false):
#   ros2 launch hexapod_gait gait.launch.py use_sim_time:=true \
#     params_file:=$(ros2 pkg prefix hexapod_gait)/share/hexapod_gait/config/presets/sim_walk.yaml
#
# linear_max = step_length_max / stance_duration = 0.050 / 1.00 = 0.050 m/s.
# =============================================================================

/gait_node:
  ros__parameters:
    radial_distance: 0.160
    body_height: -0.080
    step_length_max: 0.050
    step_height: 0.040
    cycle_time: 2.00
    gait_pattern: tripod
