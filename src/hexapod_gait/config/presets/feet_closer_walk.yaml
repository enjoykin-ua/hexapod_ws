# =============================================================================
# Hexapod gait_node Preset — "Feet-closer Walk" (Phase 13 Stage 1 Teil 2.2, 2026-06-02)
# =============================================================================
#
# Lauf-Pose, die die in Teil 2.1 freigeschaltete Tibia-Beuge (+2.50) ausnutzt:
# Füße NÄHER am Körper (radial 0.215 statt 0.295) → Bein weniger gestreckt
# → größerer Stride bleibt in Reichweite. Doppelte Schrittweite + omnidirektional.
# Update 2026-06-02: Körper 4 cm höher (body_height -0.120) + Fuß-Hub 8 cm
# (step_height 0.080) auf User-Wunsch — alles vom Envelope grün bestätigt.
#
# Zwei-Phasen (Stage 1 Teil 2.3): Dieses Preset ist self-contained — es enthält
# BEIDE radii. Die Engine steht mit standup_radial_distance (0.295, touchdown-
# sicher) @ body_height -0.120 auf und repositioniert danach automatisch per Tripod
# auf radial_distance (0.215, Walk-Pose). Daher beim Launch direkt ladbar (anders als
# vor 2.3, wo radial 0.215 am Standup-Touchdown den Femur >90° gezwungen hätte).
#
# Herkunft: tools/walking_envelope_check.py — Sweep + recommend.
#   ALLE 4 cmd_vel-Szenarien (forward/sidestep/yaw/diagonal) ✓ GRÜN @ -0.120.
#   standup_envelope @ standup_radial 0.295 → -0.120 ✓ GRÜN (max direkt-aufstehbar;
#   -0.130 wäre out-of-reach → bräuchte Body-Lift-in-Reposition, Sub-Stage 2.4).
#   Engpass: keiner. Tibia NICHT mehr limitierend (<< +2.50).
#
# Vergleich (Stage-0-Stand → feet-closer high):
#   radial_distance : 0.295 → 0.215   (Füße näher, entspannteres Bein)
#   body_height     : -0.080 → -0.120 (Körper 4 cm höher)
#   step_length_max : 0.050 → 0.089   (~2×, 10% Marge vom Envelope-Rand)
#   step_height     : 0.030 → 0.080   (Fuß-Hub 3 → 8 cm; gilt Lauf + Reposition)
#   linear_max      : 0.05  → 0.089 m/s
#
# Validierung (offline): python3 tools/walking_envelope_check.py check \
#   --radial 0.215 --body-height -0.120 --step-length 0.089 --step-height 0.080 --scenario all
#
# Laden (Sim, use_sim_time:=true; HW: use_sim_time:=false):
#   ros2 launch hexapod_gait gait.launch.py \
#     robot_description_file:=$(ros2 pkg prefix hexapod_description)/share/hexapod_description/urdf/hexapod.urdf.xacro \
#     params_file:=$(ros2 pkg prefix hexapod_gait)/share/hexapod_gait/config/presets/feet_closer_walk.yaml
#
# Reproduzieren nach Cal-/Limit-Änderung:
#   python3 tools/walking_envelope_check.py sweep   # Übersicht
# Plan: docs_raspi/phase_13_stage_1_tibia_unlock_plan.md §2 Sub-Stage 2.2.
# =============================================================================

/gait_node:
  ros__parameters:
    # Zwei-Phasen (Stage 1 Teil 2.3): mit standup_radial_distance aufstehen,
    # dann automatisch per Tripod auf radial_distance (Walk-Pose) reposition.
    standup_radial_distance: 0.295   # breite, touchdown-sichere Aufsteh-Pose
    radial_distance: 0.215           # Walk-Ziel (Tool-Ergebnis @ body -0.120), Reposition dorthin
    reposition_cycle_time: 2.00      # Dauer der Tripod-Umsetz-Bewegung (s, min 1.0)
    # Körper 4 cm höher als der Stage-0-Stand (war -0.080). -0.120 ist die
    # max. direkt-aufstehbare Höhe @ standup_radial 0.295 (standup_envelope grün);
    # -0.130 (5 cm) ginge nur mit Body-Lift-in-der-Reposition (Sub-Stage 2.4).
    body_height: -0.120
    body_height_min: -0.120          # Floor absenken, damit -0.120 in [min,max] gültig ist
    step_length_max: 0.089
    step_height: 0.080               # Fuß-Hub 8 cm (war 4 cm) — gilt Lauf UND Reposition (gekoppelt)
    cycle_time: 2.00
    gait_pattern: tripod
