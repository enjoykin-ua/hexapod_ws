# =============================================================================
# Hexapod gait_node Preset — "Feet-closer Walk" (Phase 13 Stage 1 Teil 2.2, 2026-06-02)
# =============================================================================
#
# Lauf-Pose, die die in Teil 2.1 freigeschaltete Tibia-Beuge (+2.50) ausnutzt:
# Füße ~8 cm NÄHER am Körper (radial 0.220 statt 0.295) → Bein weniger gestreckt
# → größerer Stride bleibt in Reichweite. Doppelte Schrittweite + omnidirektional.
#
# Zwei-Phasen (Stage 1 Teil 2.3): Dieses Preset ist self-contained — es enthält
# BEIDE radii. Die Engine steht mit standup_radial_distance (0.295, touchdown-
# sicher) auf und repositioniert danach automatisch per Tripod auf radial_distance
# (0.220, Walk-Pose). Daher beim Launch direkt ladbar (anders als vor 2.3, wo
# radial 0.220 am Standup-Touchdown den Femur >90° gezwungen hätte → IK-Fail).
#
# Herkunft: tools/walking_envelope_check.py — Sweep + Variante-B-Check.
#   ALLE 4 cmd_vel-Szenarien (forward/sidestep/yaw/diagonal) ✓ GRÜN.
#   Vorher (radial 0.295 / step 0.05): ❌ RED out_of_reach (Fuß d=0.2812 > 0.2799).
#   Engpass jetzt: keiner. Tibia ist NICHT mehr limitierend (max ~1.1 << +2.50).
#
# Vergleich:
#   radial_distance : 0.295 → 0.220   (Füße näher, Bein 94% → entspannter)
#   step_length_max : 0.050 → 0.089   (~2×, 10% Sicherheits-Marge vom Envelope-Rand)
#   step_height     : 0.030 → 0.040   (mehr Fuß-Hub / Bodenfreiheit)
#   linear_max      : 0.05  → 0.089 m/s
#
# Validierung (offline): python3 tools/walking_envelope_check.py check \
#   --radial 0.220 --body-height -0.080 --step-length 0.089 --step-height 0.040 --scenario all
#
# Laden (Sim, use_sim_time:=true; HW: use_sim_time:=false):
#   ros2 launch hexapod_gait gait.launch.py \
#     robot_description_file:=$(ros2 pkg prefix hexapod_description)/share/hexapod_description/urdf/hexapod.urdf.xacro \
#     params_file:=$(ros2 pkg prefix hexapod_gait)/share/hexapod_gait/config/presets/feet_closer_walk.yaml
#
# Reproduzieren nach Cal-/Limit-Änderung:
#   python3 tools/walking_envelope_check.py sweep   # Übersicht
# Plan: docs_raspi/phase_13_stage_1_tibia_unlock_plan.md §2 Sub-Stage 2.2.
# =============================================================================

/gait_node:
  ros__parameters:
    # Zwei-Phasen (Stage 1 Teil 2.3): mit standup_radial_distance aufstehen,
    # dann automatisch per Tripod auf radial_distance (Walk-Pose) reposition.
    standup_radial_distance: 0.295   # breite, touchdown-sichere Aufsteh-Pose
    radial_distance: 0.220           # Walk-Ziel (Tool-Ergebnis), Reposition dorthin
    reposition_cycle_time: 2.00      # Dauer der Tripod-Umsetz-Bewegung (s, min 1.0)
    body_height: -0.080
    step_length_max: 0.089
    step_height: 0.040
    cycle_time: 2.00
    gait_pattern: tripod
