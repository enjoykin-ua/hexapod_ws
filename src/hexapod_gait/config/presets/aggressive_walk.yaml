# =============================================================================
# Hexapod gait_node Preset — "Aggressive Walk" (leg_changes / S5)
# =============================================================================
#
# Schneller Stil / Stress-Test fuer IK + Trajectory-Generation. Stance-Pose =
# "mittel" (radial 0.160, body_height -0.080). Groesster Stride der Cycle-Range
# + schnellerer Takt + hoeherer Foot-Hub.
#
# Charakteristik (gegenueber sim_walk):
#   - cycle_time 1.5 s (schneller)
#   - step_length_max 0.070 (Obergrenze des D-Pad-Cycle, envelope-Marge zur Wand)
#     → linear_max = 0.070 / (1.5 × 0.5) = 0.093 m/s
#   - step_height 0.050
#
# Envelope-validiert (alle 4 Szenarien GRUEN, cycle_time irrelevant fuer Reach):
#   python3 tools/walking_envelope_check.py check \
#     --radial 0.160 --body-height -0.080 --step-length 0.070 --step-height 0.050 --scenario all
#
# WICHTIG fuer HW: erst aufgebockt, Strom beobachten, linear.x schrittweise hoch.
#
# Laden:
#   ros2 launch hexapod_gait gait.launch.py \
#     params_file:=$(ros2 pkg prefix hexapod_gait)/share/hexapod_gait/config/presets/aggressive_walk.yaml
# =============================================================================

/gait_node:
  ros__parameters:
    radial_distance: 0.160
    body_height: -0.080
    step_length_max: 0.070
    step_height: 0.050
    cycle_time: 1.50
    gait_pattern: tripod
