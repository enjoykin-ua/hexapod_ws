# =============================================================================
# Hexapod gait_node Preset — "Defensive Walk" (leg_changes / S5)
# =============================================================================
#
# Langsam-sicher: fuer Erstinbetriebnahme, Bench-Tests, neue Cal-Sessions
# (insb. der erste echte HW-Lauf in S6). Grosse cycle_time, kleine Schritte,
# niedrige Foot-Hub. Stance-Pose = "mittel" (radial 0.160, body_height -0.080).
#
# Charakteristik (gegenueber sim_walk):
#   - cycle_time 4.0 s (doppelt so langsam)
#   - step_length_max 0.030 (kleiner Stride)  → linear_max = 0.030/2.0 = 0.015 m/s
#   - step_height 0.030 (niedrige Foot-Hub)
#
# Envelope-validiert (alle 4 Szenarien GRUEN):
#   python3 tools/walking_envelope_check.py check \
#     --radial 0.160 --body-height -0.080 --step-length 0.030 --step-height 0.030 --scenario all
#
# Laden:
#   ros2 launch hexapod_gait gait.launch.py \
#     params_file:=$(ros2 pkg prefix hexapod_gait)/share/hexapod_gait/config/presets/defensive_walk.yaml
# =============================================================================

/gait_node:
  ros__parameters:
    radial_distance: 0.160
    body_height: -0.080
    step_length_max: 0.030
    step_height: 0.030
    cycle_time: 4.00
    gait_pattern: tripod
