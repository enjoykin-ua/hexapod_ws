# =============================================================================
# Hexapod gait_node Preset — "Demo Walk" (leg_changes / S5)
# =============================================================================
#
# Mittel-schnell mit sichtbarer Bein-Bewegung (Demos/Videos). Stance-Pose =
# "mittel" (radial 0.160, body_height -0.080). Hoeherer Foot-Hub als sim_walk.
#
# Charakteristik (gegenueber sim_walk):
#   - step_height 0.050 (Beine heben sichtbar hoeher)
#   - cycle_time + step_length_max wie sim_walk (2.0 s / 0.050) → 0.050 m/s
#
# Envelope-validiert (alle 4 Szenarien GRUEN):
#   python3 tools/walking_envelope_check.py check \
#     --radial 0.160 --body-height -0.080 --step-length 0.050 --step-height 0.050 --scenario all
#
# Laden:
#   ros2 launch hexapod_gait gait.launch.py \
#     params_file:=$(ros2 pkg prefix hexapod_gait)/share/hexapod_gait/config/presets/demo_walk.yaml
# =============================================================================

/gait_node:
  ros__parameters:
    radial_distance: 0.160
    body_height: -0.080
    step_length_max: 0.050
    step_height: 0.050
    cycle_time: 2.00
    gait_pattern: tripod
