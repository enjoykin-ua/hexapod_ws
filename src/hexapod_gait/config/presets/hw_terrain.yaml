# =============================================================================
# Hexapod gait_node Preset — "HW Terrain" (A5 Stufe 8: Fußkontakt-Closed-Loop)
# =============================================================================
#
# Das FAHRBEREITE Komplett-Preset fuer den 3-Terminal-Bringup (Test HW8.8a):
# EIN gait.launch.py-Befehl -> automatisches Aufstehen -> danach ist ALLES
# aktiv (Leveling 'auto' + adaptiver Touchdown + Adaptive Stand + Slip-Freeze
# + Sensor-Plausibilitaet) — kein einziges `ros2 param set` mehr noetig.
#
# params_file laedt nur EIN File -> dieses Preset enthaelt deshalb BEIDE
# Bloecke: die HW-VERIFIZIERTEN Leveling-Werte (uebernommen aus hw_balance.yaml,
# Stufe 7) + die S4-Fusskontakt-Params (Stand: Sim-Defaults; nach dem
# HW8.3/8.4-Tuning hier nachziehen). hw_balance.yaml bleibt das reine
# Leveling-Tuning-Preset.
#
# ⚠️ SICHERHEIT (CLAUDE.md §9): dieses Preset schaltet die Regelkreise ab dem
# Start scharf (leveling_enable + alle S4-Enables = true) — NUR beaufsichtigt
# fahren, Kill-Switch bereit. Die Code-Defaults bleiben false (Opt-in); das
# Scharf-Schalten lebt bewusst nur hier im Preset. Waehrend Aufstehen/Hinsetzen/
# Reposition sind alle Regelkreise ohnehin state-gated inaktiv.
#
# LADEN (auf dem Pi, nach colcon build):
#   ros2 launch hexapod_gait gait.launch.py use_sim_time:=false \
#     robot_description_file:=$(ros2 pkg prefix --share hexapod_description)/urdf/hexapod.urdf.xacro \
#     params_file:=$(ros2 pkg prefix hexapod_gait)/share/hexapod_gait/config/presets/hw_terrain.yaml
# =============================================================================

/gait_node:
  ros__parameters:
    # --- Kipp-/Sturz-Erkennung (Safe-State, per Achse) — wie hw_balance -------
    tip_detection_enable: true
    tip_angle_warn_deg_roll: 15.0
    tip_angle_warn_deg_pitch: 15.0
    tip_angle_crit_deg_roll: 25.0
    tip_angle_crit_deg_pitch: 25.0
    tip_rate_crit_dps: 80.0
    tip_debounce_ticks: 5

    # --- Leveling — HW-verifizierte v2-Werte (Stufe 7) + 'auto' (HW8.7b) ------
    #     'auto' = STANDING levelt voll aus (horizontal), WALKING/STOPPING =
    #     terrain (Hang folgen). Kein manuelles Umschalten mehr.
    leveling_enable: true
    leveling_mode: auto
    leveling_kp_roll: 1.3            # HW-verifiziert (Stufe 7)
    leveling_kp_pitch: 1.3
    leveling_ki_roll: 0.1
    leveling_ki_pitch: 0.1
    leveling_kd_roll: 0.03
    leveling_kd_pitch: 0.03
    leveling_deadband_inner_deg_roll: 1.0
    leveling_deadband_inner_deg_pitch: 1.0
    leveling_deadband_outer_deg_roll: 2.0
    leveling_deadband_outer_deg_pitch: 2.0
    leveling_slew_max_dps_roll: 8.0
    leveling_slew_max_dps_pitch: 8.0
    leveling_tau_fast_s_roll: 0.0
    leveling_tau_fast_s_pitch: 0.0
    leveling_tau_slow_s_roll: 0.0
    leveling_tau_slow_s_pitch: 0.0
    leveling_max_angle_deg: 10.0     # offline envelope-bewiesen — NICHT erhoehen
    leveling_max_angle_walking_deg: 4.0
    leveling_startup_grace: true

    # --- Terrain-Following-Schaetzer (TF-1) ------------------------------------
    slope_aware_tip_enable: true
    slope_estimate_tau_s: 0.5
    slope_clamp_deg: 40.0

    # --- S4-2 adaptiver Touchdown (WALKING) — Sim-Defaults, HW8.3-Tuning hier --
    adaptive_touchdown_enable: true
    touchdown_probe_start_stance_phase: 0.35
    touchdown_search_end_stance_phase: 0.6
    touchdown_max_extra_depth: 0.02

    # --- S4-4 Slip/Kante -> Freeze (WALKING) — Sim-Defaults, HW8.4-Tuning hier -
    slip_detection_enable: true
    cliff_depth: 0.03
    slip_debounce_ticks: 8
    slip_min_lost_legs: 1
    slip_grace_stance_phase: 0.6

    # --- S4-5 Sensor-Plausibilitaet -> maskieren (WALKING) ---------------------
    sensor_plausibility_enable: true
    sensor_apex_band_low: 0.3
    sensor_apex_band_high: 0.7
    sensor_apex_fault_cycles: 3
    sensor_dead_cycles: 2

    # --- S4-7 Adaptive Stand (STANDING) ----------------------------------------
    adaptive_stand_enable: true
    stand_conform_max_depth: 0.04
    stand_conform_rate: 0.02

    # --- Diagnose (S4-1): waehrend Stufe 8 an (Timing-Logs); spaeter false -----
    foot_contact_debug_enable: true
