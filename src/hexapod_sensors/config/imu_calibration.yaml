# IMU-Montage-Kalibrierung (BNO-055) — Block A5 Stufe 6 / IP2.
#
# Fixe Ausrichtung Chip -> base_link, gemessen im Kipp-Test (IP1.7 / IP2.1).
# Wird sowohl von real.launch.py (als Node-parameters) als auch beim isolierten
# Test-Start (`ros2 run hexapod_sensors bno055_imu --params-file <diese Datei>`)
# geladen. `/**` = greift unabhaengig vom Node-Namen/Namespace.
#
# axis_map_config / axis_map_sign: BNO AXIS_MAP (Datenblatt Section 3.4), im Chip
#   angewandt -> dreht Quaternion + Gyro auf base_link. Werte als Dezimal (der
#   ROS-YAML-Parser liest keine 0x-Hex zuverlaessig); Hex im Kommentar.
#   IP1.7-Befund: Sensor +90 Grad um Z verdreht. IP2.1-Kipp-Test (2026-07-05):
#   config 0x21 ordnet die Achsen korrekt zu; von den 4 config-0x21-Placement-Signs
#   liefert 0x04 (P0) flach ~0/0 UND die richtigen REP-103-Vorzeichen (rechte Seite
#   hoch -> roll negativ, Nase hoch -> pitch negativ = wie die Sim). VERIFIZIERT.
# roll_offset / pitch_offset (rad): feine Montage-Restschraege, bei ebenem Boden
#   gemessen (sign 0x04): flach roll -2.2 / pitch 3.3 Grad. build_imu dreht sie
#   Body-frame (rechts) heraus -> yaw-unabhaengig (per Sim + Unit-Test bestaetigt,
#   test_zero_offset_cancels_mounting_tilt_any_yaw). Bei ZYX-Konvention = direkt die
#   gemessenen Flach-Winkel in rad.
/**:
  ros__parameters:
    axis_map_config: 33    # 0x21  (Default P1 = 0x24 = 36)
    axis_map_sign: 4       # 0x04  (BNO-Placement P0; IP2.1 verifiziert)
    roll_offset: -0.0384   # -2.2 Grad (IP2.2 gemessen)
    pitch_offset: 0.0576   # 3.3 Grad (IP2.2 gemessen)
