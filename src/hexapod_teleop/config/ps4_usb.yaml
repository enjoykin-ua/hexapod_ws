# PS4-Controller via USB — joy_to_twist-Mapping (Block C1+).
#
# Achsen-/Button-Indizes basieren auf ros-jazzy-joy-Driver mit
# PS4-DualShock-4 per USB-Kabel. BT-Mapping kann abweichen
# (siehe ps4_bt.yaml in C4).
#
# Verifizieren mit:
#   ros2 topic echo /joy
# und Achsen/Buttons live bewegen/drücken um Indizes + Vorzeichen zu bestätigen.
joy_to_twist:
  ros__parameters:
    # --- Sticks (C1+: omnidirektional analog) ---
    axis_lx: 0            # linker Stick X  → seitwärts (linear.y)
    axis_ly: 1            # linker Stick Y  → vor/zurück (linear.x)
    axis_rx: 3            # rechter Stick X → drehen (angular.z)
    sign_lx: 1.0          # +1: Stick links liefert +1.0 → +Y (links). Bei Bedarf -1.0
    sign_ly: 1.0          # +1: Stick hoch liefert +1.0 → vorwärts. Bei Bedarf -1.0
    sign_rx: 1.0          # +1: Stick links liefert +1.0 → Drehung links (+omega)
    deadzone: 0.10        # Stick-Werte darunter = 0 (gegen Drift)

    # --- Trigger L2/R2 → Body-Höhe ---
    axis_l2: 2            # L2 analog (idle=+1, gedrückt=-1)
    axis_r2: 5            # R2 analog
    trigger_threshold: 0.5

    # --- Buttons (PS4 USB) ---
    deadman_button: 5     # R1 — Fahren nur während gehalten
    slow_button: 4        # L1 — langsam/präzise (Skalen × slow_factor)
    button_triangle: 2    # Sit/Stand-Toggle (Druck)
    button_circle: 1      # Shutdown (lang halten)
    button_cross: 0       # Show-Pose-Toggle (lang halten, B4: rein/raus)
    longpress_sec: 0.8    # Halte-Dauer für Long-Press-Aktionen

    # --- Show-Pose Free-Leg (B4): linker Stick → leg_6, rechter → leg_1 ---
    # X = seitwärts (lateral), Y = hoch/runter (vertikal). Nur in SHOW_ACTIVE
    # wirksam, per R1-Dead-Man gegated. Signs in Sim verifizieren (Stick hoch =
    # Bein heben). axis_lx/ly/rx wiederverwendet; rechter Stick Y = axis_ry.
    axis_ry: 4            # rechter Stick Y → leg_1 vertikal (hoch/runter)
    sign_show_lat: 1.0    # seitwärts-Vorzeichen (bei Bedarf -1.0)
    sign_show_vert: 1.0   # +1: Stick hoch → Bein heben (in Sim prüfen)

    # --- D-Pad (C2: Gangart + Schrittweite) ---
    axis_dpad_x: 6        # ←/→ : Gangart vorige/nächste (rechts=next)
    axis_dpad_y: 7        # ↑/↓ : Schrittweite größer/kleiner
    sign_dpad_x: 1.0      # bei verkehrter Richtung -1.0
    sign_dpad_y: 1.0      # +1: ↑ liefert +1.0 → größere Schrittweite
    dpad_threshold: 0.5
    dpad_lockout_sec: 0.3 # Debounce gegen Doppel-Trigger (HAT-Flackern)

    # --- Skalen (matchen Engine-Limits) ---
    linear_x_scale: 0.05  # m/s max vor/zurück (bei Voll-Stick)
    linear_y_scale: 0.05  # m/s max seitwärts
    angular_z_scale: 0.46 # rad/s, ~omega_max
    slow_factor: 0.5      # L1 gehalten → halbe Skalen

    # --- Body-Height (Topic-Pfad; gait_node clampt zusätzlich) ---
    # Wichtig: joy_to_twist publisht beim Start EINMALIG /cmd_body_height mit
    # body_height_init → muss == Gait-body_height sein, sonst sackt der Stand ab
    # (ai_navigation §1). Stage 1: = Stance-Modus "mittel" (-0.100, Standup-Basis).
    # Stufenlose Höhe via L2/R2 gibt es nicht mehr — L2/R2 cyclen die Stance-Modi.
    body_height_init: -0.100
    body_height_step: 0.01
    body_height_min: -0.140    # Floor für Modus "hoch"
    body_height_max: -0.030
