# PS4-Controller via USB — joy_to_twist-Mapping.
#
# Achsen-/Button-Indizes basieren auf ros-jazzy-joy-Driver mit
# PS4-DualShock-4 per USB-Kabel. BT-Mapping kann abweichen
# (siehe ps4_bt.yaml in Stufe B).
#
# Verifizieren mit:
#   ros2 topic echo /joy
# und Achsen/Buttons live drücken um Indizes zu bestätigen.
joy_to_twist:
  ros__parameters:
    # D-Pad — fährt + dreht (User-Mapping Phase 6 Stufe A)
    axis_dpad_x: 6        # ← / → (links/rechts)
    axis_dpad_y: 7        # ↑ / ↓ (vor/zurück)
    sign_dpad_x: 1.0      # +1 = ← liefert +1.0 axis-Wert
    sign_dpad_y: 1.0      # +1 = ↑ liefert +1.0 axis-Wert

    # Trigger L2/R2 für Body-Lift
    axis_l2: 2            # L2 analog (idle=+1, gedrückt=-1)
    axis_r2: 5            # R2 analog
    trigger_threshold: 0.5

    # Dead-Man-Switch
    deadman_button: 5     # R1 (Index 5 bei PS4-USB)

    # Skalen — matchen Engine-Limits
    linear_x_scale: 0.05  # m/s, max linear
    angular_z_scale: 0.46 # rad/s, ungefähr omega_max bei R_max=0.109

    # Body-Height
    # Stage 1 Teil 2.2 (2026-06-02): an die feet-closer high Walk-Pose
    # angeglichen (-0.120, = body_height im feet_closer_walk.yaml-Preset).
    # Wichtig: joy_to_twist publisht beim Start EINMALIG /cmd_body_height mit
    # diesem Wert → muss == Gait-body_height sein, sonst sackt der hohe Stand ab.
    # Bei Gait-Höhen-Änderung hier nachziehen.
    body_height_init: -0.120   # war -0.052
    body_height_step: 0.005    # 5 mm pro L2/R2-Press
